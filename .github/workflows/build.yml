name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version to build (e.g. 6.12.1)"
        required: false

# Cancel in-flight runs for the same branch on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Distro matrix (x86_64, pre-built package verification) ─────────────────
  build-deb:
    name: "deb / ${{ matrix.distro }} ${{ matrix.release }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            release: trixie
          - distro: debian
            release: bookworm
          - distro: ubuntu
            release: noble      # 24.04 LTS
          - distro: ubuntu
            release: oracular   # 24.10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bootstrap image
        run: make bootstrap-${{ matrix.distro }}

      - name: Build packages
        run: |
          make build-${{ matrix.distro }} \
            RELEASE=${{ matrix.release }} \
            ARCH=x86_64 \
            PROCS=2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liquorix-${{ matrix.distro }}-${{ matrix.release }}-x86_64
          path: artifacts/debian/${{ matrix.release }}/
          retention-days: 7

  build-arch:
    name: "pkg / arch x86_64"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bootstrap image
        run: make bootstrap-arch

      - name: Build package
        run: make build-arch ARCH=x86_64 PROCS=2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liquorix-arch-x86_64
          path: artifacts/arch/
          retention-days: 7

  build-fedora:
    name: "rpm / fedora x86_64"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bootstrap image
        run: make bootstrap-fedora

      - name: Build RPMs
        run: make build-fedora ARCH=x86_64 PROCS=2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liquorix-fedora-x86_64
          path: artifacts/fedora/
          retention-days: 7

  # ── Architecture matrix (build validation, no pre-built packages yet) ───────
  # These jobs validate that the build system is correctly parameterized on ARCH
  # and that configs exist. They will be promoted to full builds once arm64/
  # riscv64 configs are authored (see configs/<arch>/README).
  validate-arch-configs:
    name: "config / ${{ matrix.arch }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, riscv64]

    steps:
      - uses: actions/checkout@v4

      - name: Check config placeholder exists
        run: |
          if [[ -f "configs/${{ matrix.arch }}/config" ]]; then
            echo "Config found for ${{ matrix.arch }}"
          else
            echo "No config yet for ${{ matrix.arch }} — see configs/${{ matrix.arch }}/README"
            echo "This is expected until the config is authored."
          fi

  # ── Shell linting ────────────────────────────────────────────────────────────
  shellcheck:
    name: "shellcheck"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint scripts
        run: |
          find scripts/ -name '*.sh' -print0 \
            | xargs -0 shellcheck --severity=warning
